<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta — overridden per-page via SEOHead -->
    <title>Charlies XP — Experience London Like a Londoner</title>
    <meta name="description" content="Experience London like a Londoner. Charlies XP — personal, human, editorial guides to London's best places, zones, and hidden stories." />
    <meta name="theme-color" content="#9D3A3D" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Charlies XP" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:title" content="Charlies XP — Experience London Like a Londoner" />
    <meta property="og:description" content="Experience London like a Londoner. Personal, human, editorial guides to London's best places and hidden stories." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Charlies XP — Experience London Like a Londoner" />
    <meta name="twitter:description" content="Experience London like a Londoner. Personal, human, editorial guides to London's best places and hidden stories." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — non-blocking via preload to eliminate render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
